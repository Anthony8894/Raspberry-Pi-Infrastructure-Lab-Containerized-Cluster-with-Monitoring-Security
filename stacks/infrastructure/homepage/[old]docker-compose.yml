services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.50.199:3001,dashboard.anthonylearchive.com
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

